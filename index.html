<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Archive</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; font-family: 'Georgia', serif; }
      canvas { display: block; }

      /* Crosshair */
      #crosshair {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 16px; height: 16px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(200,180,140,0.7);
      }
      #crosshair::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
      #crosshair::after  { height: 1px; width: 100%; top: 50%; transform: translateY(-50%); }
      body.locked #crosshair { opacity: 1; }

      /* Start screen */
      #start {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(0,0,0,0.96);
        color: #c8b47a;
        z-index: 100;
        gap: 1rem;
      }
      #start h1 {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        letter-spacing: 0.1em;
        color: #e8d8b0;
        font-weight: normal;
      }
      #start p {
        font-size: 0.85rem;
        color: #7a6a50;
        letter-spacing: 0.08em;
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
      }
      #start .hint {
        margin-top: 2rem;
        font-size: 0.75rem;
        color: #5a4a38;
        font-family: 'Courier New', monospace;
        text-align: center;
        line-height: 2.2;
      }
      #enter-btn {
        margin-top: 1.5rem;
        padding: 0.7rem 2.5rem;
        background: transparent;
        border: 1px solid #7a6238;
        color: #c8a860;
        font-family: 'Courier New', monospace;
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      #enter-btn:hover {
        background: rgba(180,140,60,0.12);
        border-color: #c8a860;
        color: #e8d0a0;
      }

      /* Artifact panel */
      #artifact-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: linear-gradient(to top, rgba(5,4,2,0.99) 60%, transparent);
        padding: 2rem 3rem 2.5rem;
        transform: translateY(100%);
        transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
        pointer-events: none;
        z-index: 10;
      }
      #artifact-panel.visible {
        transform: translateY(0);
        pointer-events: auto;
      }
      .panel-catalogue,
      .panel-reading {
        font-family: 'Courier New', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #5a4a2a;
        margin-bottom: 0.4rem;
      }
      .panel-title {
        font-size: clamp(1.1rem, 3vw, 1.8rem);
        color: #e8d8b0;
        margin-bottom: 0.35rem;
        line-height: 1.2;
      }
      .panel-summary {
        font-size: 0.82rem;
        color: #b8ad92;
        line-height: 1.6;
        max-width: 580px;
        margin-bottom: 0.8rem;
      }
      .panel-date {
        font-family: 'Courier New', monospace;
        font-size: 0.68rem;
        color: #7a6a50;
        margin-bottom: 0.9rem;
      }
      .panel-desc {
        font-size: 0.82rem;
        color: #9a8a6a;
        line-height: 1.8;
        max-width: 580px;
      }
      .panel-close {
        margin-top: 1.2rem;
        display: inline-block;
        font-family: 'Courier New', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #4a3a20;
        cursor: pointer;
        transition: color 0.2s;
      }
      .panel-close:hover { color: #c8a860; }

      /* Interact hint */
      #interact-hint {
        position: fixed;
        bottom: 2.5rem; left: 50%;
        transform: translateX(-50%);
        font-family: 'Courier New', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #9a8a60;
        background: rgba(0,0,0,0.55);
        padding: 0.45rem 1.1rem;
        border: 1px solid #2a2010;
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
        z-index: 5;
      }
      #interact-hint.visible { opacity: 1; }

      /* Nav hint */
      #nav-hint {
        position: fixed;
        top: 1.5rem; right: 1.75rem;
        font-family: 'Courier New', monospace;
        font-size: 0.52rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #3a3028;
        line-height: 2.2;
        text-align: right;
        opacity: 0;
        transition: opacity 2s;
        pointer-events: none;
      }
      body.locked #nav-hint { opacity: 1; }

      /* Vignette */
      #vignette {
        position: fixed; inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.7) 100%);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="start">
      <p style="font-size:0.58rem; letter-spacing:0.3em; color:#3a3020; font-family:'Courier New',monospace; text-transform:uppercase">Classified Collection — Restricted Access</p>
      <h1>The Archive</h1>
      <p>Catalogue VII &nbsp;·&nbsp; Est. MCMXII</p>
      <button id="enter-btn">Enter the Archive</button>
      <div class="hint">
        W A S D &nbsp;—&nbsp; move &nbsp;&nbsp;·&nbsp;&nbsp; Mouse &nbsp;—&nbsp; look<br/>
        E &nbsp;—&nbsp; examine item &nbsp;&nbsp;·&nbsp;&nbsp; ESC &nbsp;—&nbsp; release mouse
      </div>
    </div>

    <div id="crosshair"></div>
    <div id="vignette"></div>

    <div id="nav-hint">
      W A S D — move<br/>
      Mouse — look<br/>
      E — examine<br/>
      C — close<br/>
      ESC — release mouse
    </div>

    <div id="interact-hint">Press E to examine</div>

    <div id="artifact-panel">
      <div class="panel-catalogue" id="panel-catalogue"></div>
      <div class="panel-reading" id="panel-reading"></div>
      <div class="panel-title" id="panel-title"></div>
      <div class="panel-summary" id="panel-summary"></div>
      <div class="panel-date" id="panel-date"></div>
      <div class="panel-desc" id="panel-desc"></div>
      <div class="panel-close" id="panel-close">[ Press C ]</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
